# Detekt configuration — Phase 18 strict mode (Task 9–10).
#
# Layered on top of detekt's bundled defaults (`buildUponDefaultConfig = true`
# in `app/build.gradle.kts`). Only rules whose default behaviour does not fit
# this project's shape are listed below. The Gradle plugin's
# `failOnSeverity = Error` (default) causes any unsuppressed finding emitted
# at `severity: error` to fail the build, which is the wired strict gate.
#
# Detekt 2.0.x naming: thresholds renamed to allowed*, `UnusedImports` →
# `UnusedImport`, the legacy `failFast: true` top-level switch was removed in
# 1.22 and is intentionally not present here.

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

complexity:
  active: true
  ComplexCondition:
    active: true
    allowedConditions: 5
  CyclomaticComplexMethod:
    active: true
    # The orchestration core (GraphExecutionEngine, ToolNodeExecutor, model
    # mapping) genuinely branches across many node/provider/error states.
    # 25 keeps real complexity hotspots visible while accepting the inherent
    # branching of a typed dispatcher.
    allowedComplexity: 25
    # `@Composable` functions aggregate many conditional renderings; the rule
    # is calibrated for imperative business logic, not declarative UI.
    ignoreAnnotated: ['Composable']
  LargeClass:
    active: true
    # Compose `*Screen` files frequently host many top-level helper
    # composables which together push the class-equivalent line count above
    # the default 600.
    excludes:
      - '**/presentation/ui/**'
  LongMethod:
    active: true
    # Default 60 is too tight for graph-execution loops, JSON serialisers, and
    # pipeline factories. 120 still flags genuinely sprawling functions.
    allowedLines: 120
    # `@Composable` functions are by nature declarative trees and routinely
    # exceed 120 lines; ktlint already enforces formatting.
    ignoreAnnotated: ['Composable']
  LongParameterList:
    active: true
    allowedFunctionParameters: 10
    allowedConstructorParameters: 14
    # `@Composable` slot APIs commonly take many small lambda parameters.
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    active: true
    # DAO interfaces, repository contracts, and Hilt DI modules naturally
    # expose >11 functions; the rule's intent (god-class detection) is still
    # served at 25.
    allowedFunctionsPerFile: 25
    allowedFunctionsPerClass: 25
    allowedFunctionsPerInterface: 25
    allowedFunctionsPerObject: 25
    allowedFunctionsPerEnum: 25
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: true

exceptions:
  active: true
  # On-device LLM / native / Android-IO call sites genuinely have an open
  # exception surface — the canonical pattern is `catch (e: Exception)` →
  # `Timber.e(...)` → `Result.failure`. Forcing specific catches would
  # produce false confidence (the SDKs don't declare typed exception
  # hierarchies). The "fail-safe" wrapper IS the safety contract here.
  TooGenericExceptionCaught:
    active: false
  # When mapping a caught throwable to a `Result.failure(domainError)` or to a
  # user-facing string, the original `Throwable` is intentionally not
  # rethrown — its message is preserved in the failure value. This is the
  # whole point of the boundary, not a bug.
  SwallowedException:
    active: false

style:
  active: true
  ReturnCount:
    active: true
    # Multi-return early-exit is idiomatic Kotlin (`?: return`, validation
    # cascades). 5 still catches functions where the structure has become
    # genuinely tangled.
    max: 5
  ThrowsCount:
    active: true
    max: 4
  MagicNumber:
    active: true
    # `AppDatabase.kt` is excluded because every `Migration(from, to)` block has a
    # unique pair of version numbers — extracting them into constants would yield
    # one named constant per migration with no semantic benefit and would obscure
    # the surrounding KDoc that already documents each step.
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      - '**/*.Test.kt'
      - '**/*Test.kt'
      - '**/*Spec.kt'
      - '**/data/local/AppDatabase.kt'
    ignoreNumbers: ['-1', '0', '1', '2', '100']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    # KDoc lines that reference long fully-qualified class names or external
    # URLs unavoidably overshoot 120; ktlint already enforces the limit on
    # actual code statements, so detekt's job here is the same constraint —
    # there is no benefit to flagging the comment a second time.
    excludeCommentStatements: true
    excludeRawStrings: true
  UnusedImport:
    active: true
  # Phase 18 / Task 8/10 — surface dead private/internal declarations
  # project-wide. Triage outcome: either delete the symbol or annotate it with
  # `@Suppress("UnusedPrivateFunction" | "UnusedPrivateProperty" | "UnusedPrivateClass") // reason: …`
  # when retention is intentional. (detekt 2.x split the legacy
  # `UnusedPrivateMember` rule into the three rules below.)
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    active: true
  UnusedPrivateProperty:
    active: true
  # Pipeline / graph traversal loops legitimately use multiple `break` /
  # `continue` for early-exit cascades; the rule produces false positives on
  # otherwise straightforward control flow.
  LoopWithTooManyJumpStatements:
    active: false

naming:
  active: true
  # `@Composable` functions are PascalCase by Jetpack Compose convention.
  # Mirrors the ktlint `ktlint_function_naming_ignore_when_annotated_with`
  # rule in `.editorconfig`.
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']

# Phase 18 / Task 8/10 — enforce the KDoc rule from CLAUDE.md ("every public
# class/interface/method/property must have exhaustive KDoc"). Scope is
# intentionally narrow: only `domain/` (business contracts) and
# `data/repositories/` (concrete repository implementations) — UI layers are
# excluded because Composable functions and UI-state classes are
# self-describing and the rule would otherwise produce noise on `@Composable`
# functions and on `data class` UI-state holders.
comments:
  active: true
  UndocumentedPublicClass:
    active: true
    includes: ['**/domain/**', '**/data/repositories/**']
    searchInNestedClass: true
    searchInInnerClass: true
    searchInInnerObject: true
    searchInInnerInterface: true
    searchInProtectedClass: false
  UndocumentedPublicFunction:
    active: true
    includes: ['**/domain/**', '**/data/repositories/**']
    searchProtectedFunction: false
  UndocumentedPublicProperty:
    active: true
    includes: ['**/domain/**', '**/data/repositories/**']
    searchProtectedProperty: false
