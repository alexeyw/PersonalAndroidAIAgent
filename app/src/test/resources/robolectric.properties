# Pin the Robolectric runtime SDK level for every JVM
# unit test under `app/src/test/`. The repo's `compileSdk` is 37, but
# Robolectric 4.16 only ships shadow definitions up to SDK 36 (Android
# Baklava). Pinning to 36 keeps Doze / Notification / Service shadows stable
# without forcing every test class to declare its own `@Config(sdk = …)`.
sdk=36
