name: Static analysis (report-only)

# Phase 18 / Task 1/10 — runs detekt, ktlint, and Android Lint on every PR,
# uploads the generated reports as artifacts, and intentionally does NOT fail
# the workflow on tool findings. Strict enforcement is the job of Task 9/10.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  static-analysis:
    name: Detekt + ktlint + Android Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detekt
        continue-on-error: true
        run: ./gradlew :app:detekt --continue

      - name: ktlintCheck
        continue-on-error: true
        run: ./gradlew :app:ktlintCheck --continue

      - name: Android Lint (debug)
        continue-on-error: true
        run: ./gradlew :app:lintDebug --continue

      - name: Upload static-analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            app/build/reports/detekt/
            app/build/reports/ktlint/
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          retention-days: 14
          if-no-files-found: warn
