name: Check

# Phase 18 / Task 9-10 — strict-mode CI gate.
# Runs the aggregate `./gradlew check` task, which itself triggers detekt,
# ktlintCheck, lintDebug, testDebugUnitTest, koverVerifyDebug,
# verifyBrowserEditorConstants, and the project-level `checkNoInternalFqn`.
# Any one of them failing blocks the merge.
#
# Triggers: every pull request targeting `main`, and every push to `main`
# (so the badge reflects the head of the protected branch). `workflow_dispatch`
# allows a manual run from the Actions tab — useful to exercise the gate on a
# phase branch before the phase→main PR exists.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ./gradlew check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform 37
        # `compileSdk = release(37)` requires the API 37 platform; install it
        # explicitly so the build does not depend on what the runner image
        # happens to preinstall.
        run: sdkmanager "platforms;android-37"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run ./gradlew check
        run: ./gradlew check --stacktrace --no-daemon

      - name: Upload detekt report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          if-no-files-found: ignore

      - name: Upload ktlint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/
          if-no-files-found: ignore

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore

      - name: Upload Kover coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: app/build/reports/kover/
          if-no-files-found: ignore

      - name: Upload Roborazzi diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-report
          path: |
            catalog/build/outputs/roborazzi/
            catalog/build/reports/roborazzi/
          if-no-files-found: ignore

      - name: Upload unit-test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
