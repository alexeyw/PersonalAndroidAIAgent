        // drawflow ids during the rebuild and use that map when wiring
        // connections.
        const idMap = new Map();
        suppressAutoLabel = true;
        try {
            // Wipe everything: graph, history, labels.
            editor.clear();
            connectionLabels.clear();

            rawNodes.forEach(jn => {
                const t = NODE_TYPE_BY_ID[jn.type];
                // Reconstruct the flat fields the legacy path used — these feed
                // deriveRichFromFlat when the document carries no nodeConfig.
                const flatIn = {
                    label: jn.label || t.label,
                    systemPrompt: jn.config?.systemPrompt || '',
                    cloudProvider: jn.config?.cloudProvider || (jn.type === 'CLOUD' ? 'auto' : ''),
                    modelPath: jn.config?.modelPath || '',
                    toolName: jn.config?.toolName || '',
                    clarificationTimeoutMs: jn.config?.clarificationTimeoutMs ?? null,
                    conditionPrompt: jn.config?.conditionPrompt || '',
                    conditionKeywords: jn.config?.conditionKeywords || '',
                    conditionComplexity: jn.config?.conditionComplexity ?? null,
                };
                // Legacy intentRouterPrompt → folded into the flat systemPrompt.
                if (jn.config?.intentRouterPrompt && !flatIn.systemPrompt) {
                    flatIn.systemPrompt = jn.config.intentRouterPrompt;
                }
                // Prefer the rich nodeConfig envelope; otherwise derive the rich
                // config from the flat fields (older exports / hand presets).
                const cfg = (jn.nodeConfig && typeof jn.nodeConfig === 'object')
                    ? decodeRichEnvelope(jn.type, jn.nodeConfig)
                    : deriveRichFromFlat(jn.type, flatIn);
                cfg.title = flatIn.label || cfg.title;
                // Re-derive the flat fields from cfg so the two never drift.
                const data = Object.assign(defaultNodeData(jn.type), richToFlat(jn.type, cfg), {
                    label: cfg.title,
                    cfg: cfg,
                    contextConfig: Object.assign(defaultContextConfig(jn.type), jn.contextConfig || {}, {
                        nodeInput: true, // locked-on regardless of file contents
                    }),
                });
                const dfId = editor.addNode(
                    t.id, t.inputs, t.outputs,
                    jn.position?.x ?? 0, jn.position?.y ?? 0,
                    'nodetype-' + t.id,
                    data,
                    nodeHtml(t),
                );
                idMap.set(jn.id, String(dfId));
                // Patch the visible label inside the just-rendered node.
                const labelEl = document.querySelector(`#node-${dfId} .node-body .label`);
                if (labelEl) labelEl.textContent = data.label || t.label;
            });

            rawConnections.forEach(jc => {
                const srcDf = idMap.get(jc.fromNodeId);
                const tgtDf = idMap.get(jc.toNodeId);
                if (!srcDf || !tgtDf) {
                    console.warn('Connection references unknown node:', jc);
                    return;
                }
                const srcType = editor.getNodeFromId(srcDf)?.name;
                const outClass = pickOutputClass(srcType, jc.label);
                const inClass = 'input_1';
                editor.addConnection(srcDf, tgtDf, outClass, inClass);
                if (jc.label) {
                    connectionLabels.set(connectionKey(srcDf, outClass, tgtDf, inClass), jc.label);
                }
            });

            // Restore pipeline-level identity & name from the file.
            currentPipelineId = doc.id || generateUuid();
            nameInput.value = doc.name || '';
        } finally {
            suppressAutoLabel = false;
        }

        redrawLabels();
        // The history stack belongs to the pre-import state — wipe it so the
        // user can't undo "into" an inconsistent half-imported snapshot.
        history = [];
        historyIndex = -1;
        pushSnapshot();
        runValidation();
    }

    /**
     * Picks which output socket a connection should attach to when
     * recreating it from JSON. For single-output types we always use
     * output_1; for multi-output types we honour the inline-port labels
     * (True/False, Item/Done, Pass/Retry/Fail) so the rebuilt graph
     * matches what the user exported.
     */
    function pickOutputClass(srcType, label) {
        if (srcType === 'IF_CONDITION') {
            if (label === 'False') return 'output_2';
            return 'output_1';
        }
        if (srcType === 'QUEUE_PROCESSOR') {
            if (label === 'Done') return 'output_2';
            return 'output_1';
        }
        if (srcType === 'EVALUATION') {
            if (label === 'Retry') return 'output_2';
            if (label === 'Fail') return 'output_3';
            return 'output_1';
        }
        return 'output_1';
    }

    /* ==================================================================== *
     *  Pipeline presets
     *
     *  A preset is a `.preset.json` document — a strict superset of the
     *  pipeline JSON owned by PipelineJsonSerializer, with three extra
     *  top-level fields (`category`, `tags`, `description`) mirroring
     *  domain/pipelineio/PipelinePresetJsonSerializer.kt. The "📚 Presets"
     *  modal exposes the bundled catalogue (BUILTIN_PIPELINE_PRESETS) and a
     *  per-browser "Mine" catalogue persisted in localStorage.
     * ==================================================================== */
    const PIPELINE_PRESETS_STORAGE_KEY = 'pipeline-editor-pipeline-presets';

    /**
     * Preset categories — mirror app.knotwork.android.domain.models.PresetCategory
     * (key = lower-case enum name). KEEP IN SYNC. See DESCRIPTION.md §8.2.
     */
    const PRESET_CATEGORIES = [
        { key: 'local',    label: 'Local' },
        { key: 'cloud',    label: 'Cloud' },
        { key: 'hybrid',   label: 'Hybrid' },
        { key: 'tool',     label: 'Tool' },
        { key: 'research', label: 'Research' },
        { key: 'other',    label: 'Other' },
    ];

    /** Decodes a category wire key to its label, falling back to "Other". */
    function presetCategoryLabel(key) {
        const found = PRESET_CATEGORIES.find(c => c.key === (key || 'other'));
        return found ? found.label : 'Other';
    }

    /**
     * Session fallback for browsers where localStorage is unavailable
     * (private mode, disabled storage, quota exceeded). `null` means
     * "localStorage is the source of truth"; once a write fails it holds the
     * live list so Save / Import / Delete stay usable for the rest of the
     * session instead of silently reverting to an empty Mine tab.
     */
    let userPipelinePresetsFallback = null;

    /**
     * Per-browser, user-managed pipeline-preset catalogue. Reads from the
     * in-memory fallback once a write has failed this session; otherwise
     * from localStorage, degrading to an empty list if the read throws.
     */
    function loadUserPipelinePresets() {
        if (userPipelinePresetsFallback !== null) return userPipelinePresetsFallback;
        try {
            const raw = localStorage.getItem(PIPELINE_PRESETS_STORAGE_KEY);
            if (!raw) return [];
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) return [];
            // Keep only documents that at least carry a nodes array — anything
            // else could not round-trip back onto the canvas.
            return parsed.filter(p => p && typeof p === 'object' && Array.isArray(p.nodes));
        } catch (_) {
            return [];
        }
    }

    function saveUserPipelinePresets(list) {
        try {
            localStorage.setItem(PIPELINE_PRESETS_STORAGE_KEY, JSON.stringify(list));
            // Write succeeded — localStorage is authoritative again.
            userPipelinePresetsFallback = null;
        } catch (_) {
            // Storage unavailable: keep the list in memory so the Mine tab and
            // subsequent loads reflect the action for this session.
            userPipelinePresetsFallback = list;
        }
    }

    /** Lower-case kebab slug used for preset ids and `.preset.json` filenames. */
    function slugifyPresetId(name) {
        const base = (name || '').toLowerCase().trim()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
        return base || 'preset';
    }

    /**
     * Builds a `.preset.json` document from the current canvas. Reuses
     * exportToJson() for the graph half (so it stays in lock-step with the
     * pipeline schema) and layers the three preset-only fields on top.
     */
    function exportToPresetJson(meta) {
        const doc = exportToJson();
        if (meta && meta.name) doc.name = meta.name;
        doc.id = (meta && meta.id) || slugifyPresetId((meta && meta.name) || doc.name);
        doc.description = (meta && meta.description) || '';
        doc.category = (meta && meta.category) || 'other';
        doc.tags = (meta && Array.isArray(meta.tags)) ? meta.tags : [];
        return doc;
    }

    /** Downloads a preset document as `<id>.preset.json`. */
    function downloadPresetJson(doc) {
        const blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (doc.id || slugifyPresetId(doc.name)) + '.preset.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    /**
     * Light structural validation for an imported `.preset.json` before it
     * is stored in the "Mine" catalogue. Mirrors the guards in
     * importFromJson so a malformed file is rejected cleanly instead of
     * surfacing later when the user tries to load it onto the canvas.
     */
    function parsePresetDoc(text) {
        let doc;
        try {
            doc = JSON.parse(text);
        } catch (e) {
            return { error: 'Failed to parse JSON: ' + e.message };
        }
        if (!doc || typeof doc !== 'object' || Array.isArray(doc)) {
            return { error: 'File does not contain a valid JSON document.' };
        }
        if (doc.nodes != null && !Array.isArray(doc.nodes)) {
            return { error: '"nodes" must be an array.' };
        }
        if (doc.connections != null && !Array.isArray(doc.connections)) {
            return { error: '"connections" must be an array.' };
        }
        const nodes = doc.nodes || [];
        for (let i = 0; i < nodes.length; i++) {
            const n = nodes[i];
            if (!n || typeof n !== 'object' || Array.isArray(n)) return { error: `nodes[${i}] is not an object.` };
            if (typeof n.id !== 'string' || !n.id) return { error: `nodes[${i}].id is missing.` };
            if (typeof n.type !== 'string' || !NODE_TYPE_BY_ID[n.type]) {
                return { error: `nodes[${i}] has unknown type "${n.type}".` };
            }
        }
        return { doc };
    }

    /**
     * Shows the schema-version mismatch confirmation for an imported preset.
     * Returns true to proceed. (The canvas-load path relies on
     * importFromJson's own mismatch dialog instead, to avoid a double
     * prompt.)
     */
    function confirmPresetSchema(doc) {
        if (doc.schemaVersion === CURRENT_SCHEMA_VERSION) return true;
        const newer = typeof doc.schemaVersion === 'number' && doc.schemaVersion > CURRENT_SCHEMA_VERSION;
        return confirm(
            `This preset was created by a ${newer ? 'newer' : 'different'} editor version ` +
            `(schemaVersion=${doc.schemaVersion}, expected ${CURRENT_SCHEMA_VERSION}). ` +
            `Some configuration may not round-trip cleanly. Import anyway?`,
        );
    }

    /* ---- Modal wiring ---- */
    const presetDialog = document.getElementById('preset-library');
    const presetSaveDialog = document.getElementById('preset-save');
    const presetBtn = document.getElementById('btn-presets');
    const fileImportPresetInput = document.getElementById('file-import-preset');
    let presetActiveTab = 'bundled';

    /** Builds one preset card (name, category badge, description, tags, actions). */
    function renderPresetCard(doc, isMine, index) {
        const card = document.createElement('div');
        card.className = 'preset-card';

        const head = document.createElement('div');
        head.className = 'preset-card-head';
        const nameEl = document.createElement('span');
        nameEl.className = 'preset-card-name';
        nameEl.textContent = doc.name || 'Untitled preset';
        const badge = document.createElement('span');
        badge.className = 'preset-badge';
        badge.textContent = presetCategoryLabel(doc.category);
        head.appendChild(nameEl);
        head.appendChild(badge);
        card.appendChild(head);

        if (doc.description) {
            const desc = document.createElement('p');
            desc.className = 'preset-card-desc';
            desc.textContent = doc.description;
            card.appendChild(desc);
        }

        const tags = Array.isArray(doc.tags) ? doc.tags : [];
        if (tags.length) {
            const tagsRow = document.createElement('div');
            tagsRow.className = 'preset-tags';
            tags.forEach(tg => {
                const t = document.createElement('span');
                t.className = 'preset-tag';
                t.textContent = tg;
                tagsRow.appendChild(t);
            });
            card.appendChild(tagsRow);
        }

        const actions = document.createElement('div');
        actions.className = 'preset-card-actions';

        const loadBtn = document.createElement('button');
        loadBtn.type = 'button';
        loadBtn.className = 'primary';
        loadBtn.textContent = 'Load';
        loadBtn.addEventListener('click', () => loadPresetOntoCanvas(doc));
        actions.appendChild(loadBtn);

        const exportRowBtn = document.createElement('button');
        exportRowBtn.type = 'button';
        exportRowBtn.textContent = 'Export';
        exportRowBtn.addEventListener('click', () => downloadPresetJson(doc));
        actions.appendChild(exportRowBtn);

        if (isMine) {
            const delBtn = document.createElement('button');
            delBtn.type = 'button';
            delBtn.className = 'danger';
            delBtn.textContent = 'Delete';
            delBtn.addEventListener('click', () => deleteUserPreset(index));
            actions.appendChild(delBtn);
        }
        card.appendChild(actions);
        return card;
    }

    /** Re-renders the active tab's list and reflects the tab selection. */
    function renderPresetList() {
        presetDialog.querySelectorAll('.preset-tab').forEach(t => {
            t.classList.toggle('is-active', t.dataset.tab === presetActiveTab);
        });
        const list = presetDialog.querySelector('[data-role="list"]');
        list.innerHTML = '';
        const isMine = presetActiveTab === 'mine';
        const items = isMine ? loadUserPipelinePresets() : BUILTIN_PIPELINE_PRESETS;
        if (!items.length) {
            const empty = document.createElement('div');
            empty.className = 'preset-empty';
            empty.textContent = isMine
                ? 'No saved presets yet. Build a graph and tap "Save canvas as preset…", or import a .preset.json file.'
                : 'No bundled presets available.';
            list.appendChild(empty);
            return;
        }
        items.forEach((doc, index) => list.appendChild(renderPresetCard(doc, isMine, index)));
    }

    function openPresetLibrary() {
        renderPresetList();
        presetDialog.showModal();
    }

    /**
     * Instantiates a preset onto the canvas. We strip the `id` so
     * importFromJson mints a fresh pipeline id (mirroring how Android
     * regenerates ids when materialising a preset), then delegate to
     * importFromJson for the graph rebuild, name restore and schema-mismatch
     * dialog.
     */
    function loadPresetOntoCanvas(doc) {
        presetDialog.close();
        importFromJson(Object.assign({}, doc, { id: undefined }));
    }

    function deleteUserPreset(index) {
        const list = loadUserPipelinePresets();
        if (index < 0 || index >= list.length) return;
        const name = list[index].name || 'this preset';
        if (!confirm(`Delete preset "${name}"? This cannot be undone.`)) return;
        list.splice(index, 1);
        saveUserPipelinePresets(list);
        renderPresetList();
    }

    /* ---- Import preset → "Mine" (non-destructive; never touches canvas) ---- */
    fileImportPresetInput.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        fileImportPresetInput.value = '';
        const reader = new FileReader();
        reader.onload = () => {
            const res = parsePresetDoc(reader.result);
            if (res.error) {
                alert('Failed to import preset: ' + res.error);
                return;
            }
            if (!confirmPresetSchema(res.doc)) return;
            const list = loadUserPipelinePresets();
            list.unshift(Object.assign({}, res.doc, {
                id: res.doc.id || generateUuid(),
                savedAt: Date.now(),
            }));
            saveUserPipelinePresets(list);
            presetActiveTab = 'mine';
            renderPresetList();
        };
        reader.onerror = () => alert('Failed to read file.');
        reader.readAsText(file);
    });

    /* ---- Save canvas as preset ---- */
    function openSavePresetDialog() {
        if (validateGraph().errors.length > 0) {
            alert('Fix the validation errors before saving this graph as a preset.');
            return;
        }
        const sel = document.getElementById('preset-save-category');
        if (!sel.options.length) {
            PRESET_CATEGORIES.forEach(c => {
                const o = document.createElement('option');
                o.value = c.key;
                o.textContent = c.label;
                sel.appendChild(o);
            });
        }
        document.getElementById('preset-save-name').value = (nameInput.value || '').trim();
        document.getElementById('preset-save-tags').value = '';
        document.getElementById('preset-save-description').value = '';
        sel.value = 'other';
        const err = presetSaveDialog.querySelector('[data-role="error"]');
        err.hidden = true;
        err.textContent = '';
        presetSaveDialog.showModal();
    }

    function commitSavePreset() {
        const err = presetSaveDialog.querySelector('[data-role="error"]');
        const name = (document.getElementById('preset-save-name').value || '').trim();
        if (!name) {
            err.textContent = 'Name is required.';
            err.hidden = false;
            return;
        }
        // 60-char cap matches MAX_NAME_LENGTH in the Android save use-cases.
        if (name.length > 60) {
            err.textContent = 'Name must be 60 characters or fewer.';
            err.hidden = false;
            return;
        }
        const tags = (document.getElementById('preset-save-tags').value || '')
            .split(',').map(t => t.trim()).filter(Boolean);
        const doc = exportToPresetJson({
            id: generateUuid(),
            name,
            category: document.getElementById('preset-save-category').value || 'other',
            tags,
            description: (document.getElementById('preset-save-description').value || '').trim(),
        });
        const list = loadUserPipelinePresets();
        list.unshift(Object.assign({}, doc, { savedAt: Date.now() }));
        saveUserPipelinePresets(list);
        presetSaveDialog.close();
        presetActiveTab = 'mine';
        renderPresetList();
    }

    presetBtn.addEventListener('click', openPresetLibrary);
    presetDialog.querySelector('[data-role="close"]').addEventListener('click', () => presetDialog.close());
    presetDialog.querySelectorAll('.preset-tab').forEach(t => {
        t.addEventListener('click', () => {
            presetActiveTab = t.dataset.tab;
            renderPresetList();
        });
    });
    presetDialog.querySelector('[data-role="import"]').addEventListener('click', () => fileImportPresetInput.click());
    presetDialog.querySelector('[data-role="save-current"]').addEventListener('click', openSavePresetDialog);
    presetSaveDialog.querySelector('[data-role="cancel"]').addEventListener('click', () => presetSaveDialog.close());
    presetSaveDialog.querySelector('[data-role="confirm"]').addEventListener('click', commitSavePreset);

    // Re-validation on dialog save and on undo/redo lives inside the
    // original commitDialog / applySnapshot bodies (see below) — function
    // declarations are hoisted so they can call runValidation() defined
    // here without a forward-declaration dance.

    // Initial empty snapshot so undo "back to blank" works after first action.
    pushSnapshot();
    updateToolbar();
    runValidation();

    // Expose for manual debugging in DevTools
    window.__editor = editor;
    window.__labels = connectionLabels;
    window.__validate = validateGraph;
    window.__exportJson = exportToJson;
    window.__importJson = importFromJson;
    window.__exportPresetJson = exportToPresetJson;
    window.__pipelinePresets = BUILTIN_PIPELINE_PRESETS;
    window.__openPresetLibrary = openPresetLibrary;
</script>
</body>
</html>
