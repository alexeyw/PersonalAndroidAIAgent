    /* -------------------------------------------------------------------- *
     *  NodeContextConfig defaults — port of
     *  NodeContextConfig.defaultForType() in the Android codebase. Kept in
     *  sync manually; if the Kotlin defaults change, update here too.
     * -------------------------------------------------------------------- */
    function defaultContextConfig(typeId) {
        const flags = (chat, orig, mem, tool) => ({
            chatHistory: chat,
            originalTask: orig,
            longTermMemory: mem,
            toolResults: tool,
            nodeInput: true, // always on; UI keeps it locked
        });
        switch (typeId) {
            case 'INPUT':
            case 'IF_CONDITION':
                return flags(false, false, false, false);
            case 'LITE_RT':
            case 'CLARIFICATION':
            case 'QUEUE_PROCESSOR':
            case 'DECOMPOSITION':
                return flags(false, true,  false, false);
            case 'CLOUD':
            case 'INTENT_ROUTER':
                return flags(true,  true,  false, false);
            case 'TOOL':
                return flags(false, false, false, false);
            case 'SUMMARY':
            case 'EVALUATION':
                return flags(false, true,  false, true);
            case 'OUTPUT':
            default:
                return flags(true, true, true, true);
        }
    }

    /**
     * Build the full data payload for a freshly-created node. All fields are
     * present (even type-irrelevant ones) so the JSON shape is stable when
     * exported in PHASE 16 — 4/5.
     */
    function defaultNodeData(typeId) {
        const t = NODE_TYPE_BY_ID[typeId];
        return {
            label: t.label,
            systemPrompt: DEFAULT_SYSTEM_PROMPTS[typeId] || '',
            cloudProvider: typeId === 'CLOUD' ? 'auto' : '',
            modelPath: '',
            toolName: '',
            clarificationTimeoutMs: typeId === 'CLARIFICATION' ? 60000 : null,
            conditionPrompt: '',
            conditionKeywords: '',
            conditionComplexity: null,
            contextConfig: defaultContextConfig(typeId),
        };
    }

    /**
     * Migrates legacy node data shapes — currently fold the deprecated
     * `intentRouterPrompt` field into `systemPrompt` (which is what the
     * runtime engine actually consumes for INTENT_ROUTER routing logic).
     * Called whenever node data is read from a foreign source: opening the
     * config dialog and parsing imported JSON.
     */
    function migrateLegacyNodeData(typeId, data) {
        if (!data) return data;
        if (typeId === 'INTENT_ROUTER' && data.intentRouterPrompt) {
            const sp = (data.systemPrompt || '').trim();
            if (!sp) data.systemPrompt = data.intentRouterPrompt;
        }
        delete data.intentRouterPrompt;
        return data;
    }

    /* -------------------------------------------------------------------- *
     *  Drawflow init
     * -------------------------------------------------------------------- */
    const canvas = document.getElementById('drawflow');
    const editor = new Drawflow(canvas);
    editor.reroute = false;
    editor.editor_mode = 'edit';
    editor.start();

    /* -------------------------------------------------------------------- *
     *  Sidebar palette + drag/drop
     * -------------------------------------------------------------------- */
    const paletteEl = document.getElementById('palette');
    /**
     * One-line tooltip per node type, shown via the native `title`
     * attribute on each palette item. Wording stays terse so the tooltip
     * does not crowd the screen on small displays.
     */
    const NODE_TYPE_TOOLTIPS = {
        INPUT:           'Pipeline entry point — receives the user message that started the run.',
        OUTPUT:          'Pipeline exit — composes and forwards the final reply to the user.',
        LITE_RT:         'Run a small on-device model (LiteRT) for fast, private inference.',
        CLOUD:           'Call a cloud LLM provider (OpenAI / Anthropic / Google / DeepSeek / auto).',
        TOOL:            'Invoke an AppFunction or registered tool with the upstream input.',
        IF_CONDITION:    'Branch downstream flow into True / False based on a classifier.',
        INTENT_ROUTER:   'Classify the user input and route to a downstream branch.',
        DECOMPOSITION:   'Break a complex task into a list of simpler subtasks.',
        QUEUE_PROCESSOR: 'Iterate over a list of subtasks; loops Item back, exits via Done.',
        EVALUATION:      'Inspect the upstream result and decide whether it is good enough.',
        SUMMARY:         'Aggregate multiple upstream results into a concise summary.',
        CLARIFICATION:   'Ask the user a clarifying question and wait for the answer.',
    };

    NODE_TYPES.forEach(t => {
        const el = document.createElement('div');
        el.className = 'palette-item';
        el.draggable = true;
        el.dataset.type = t.id;
        el.title = NODE_TYPE_TOOLTIPS[t.id] || '';
        el.innerHTML = `<span class="icon">${t.icon}</span><span class="name">${t.label}</span>`;
        el.addEventListener('dragstart', e => {
            e.dataTransfer.setData('node-type', t.id);
            e.dataTransfer.effectAllowed = 'copy';
        });
        paletteEl.appendChild(el);
    });

    canvas.addEventListener('dragover', e => {
        if (Array.from(e.dataTransfer.types).includes('node-type')) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        }
    });

    canvas.addEventListener('drop', e => {
        const typeId = e.dataTransfer.getData('node-type');
        if (!typeId || !NODE_TYPE_BY_ID[typeId]) return;
        e.preventDefault();
        const t = NODE_TYPE_BY_ID[typeId];
        // Drawflow's canonical recipe: convert viewport (clientX/Y) to canvas
        // userspace by subtracting the precanvas's own rendered rect and
        // dividing by the active zoom. precanvas already accounts for both
        // translate and scale, so this works at any zoom level.
        const pre = editor.precanvas.getBoundingClientRect();
        const x = (e.clientX - pre.left) / editor.zoom;
        const y = (e.clientY - pre.top) / editor.zoom;
        editor.addNode(
            t.id,
            t.inputs,
            t.outputs,
            x,
            y,
            'nodetype-' + t.id,
            defaultNodeData(t.id),
            nodeHtml(t),
        );
    });

    function nodeHtml(t) {
        return `
            <div class="node-body">
                <span class="icon">${t.icon}</span>
                <div>
                    <div class="label">${t.label}</div>
                    <div class="type">${t.id}</div>
                </div>
            </div>`;
    }

    /* -------------------------------------------------------------------- *
     *  Node configuration dialog
     *
     *  Triggered by double-clicking a node. Renders a form whose fields are
     *  determined by NodeType: every node has Name + System Prompt, plus a
     *  type-specific section, plus the always-visible NodeContextConfig
     *  block (5 checkboxes; nodeInput is checked + disabled to keep chain
     *  integrity, mirroring the Android NodeContextConfigSection).
     *
     *  All edits are persisted into the drawflow node's `data` field via
     *  editor.updateNodeDataFromId — `editor.export()` will round-trip them
     *  to JSON in PHASE 16 — 4/5.
     * -------------------------------------------------------------------- */
    const dialog = document.getElementById('node-config');
    const dialogIcon = dialog.querySelector('[data-role="icon"]');
    const dialogTypeBadge = dialog.querySelector('[data-role="type"]');
    const dialogBody = dialog.querySelector('[data-role="body"]');
    const dialogSaveBtn = dialog.querySelector('[data-role="save"]');
    const dialogCancelBtn = dialog.querySelector('[data-role="cancel"]');

    /** ID of the drawflow node currently being edited (numeric, no `node-` prefix). */
    let dialogNodeId = null;

    function openNodeConfigDialog(rawNodeId) {
        const numericId = String(rawNodeId).replace(/^node-/, '');
        const internal = editor.getNodeFromId(numericId);
        if (!internal) return;
        const typeId = internal.name; // drawflow stores `name` = type id we passed to addNode
        const t = NODE_TYPE_BY_ID[typeId];
        if (!t) return;

        // Migrate legacy data shapes (older snapshots may lack new fields)
        const data = migrateLegacyNodeData(
            typeId,
            Object.assign(defaultNodeData(typeId), internal.data || {}),
        );
        if (!data.contextConfig) data.contextConfig = defaultContextConfig(typeId);

        dialogNodeId = numericId;
        dialogIcon.textContent = t.icon;
        dialog.querySelector('.title').textContent = `Configure: ${data.label || t.label}`;
        dialogTypeBadge.textContent = t.id;
        dialogBody.innerHTML = '';
        dialogBody.append(...renderFormFields(t.id, data));

        // Native <dialog> shows a modal with backdrop and Esc support
        dialog.showModal();
        // Focus first visible input for keyboard-first workflow
        const firstInput = dialogBody.querySelector('input,select,textarea');
        if (firstInput) firstInput.focus();
    }

    /**
     * Builds the array of <div class="field"> nodes for the given node type.
     * The "All nodes" pair (label + systemPrompt) comes first, then the
     * type-specific section, then the contextConfig section.
     */
    function renderFormFields(typeId, data) {
        const fields = [];

        fields.push(textField({
            id: 'label',
            label: 'Node name',
            value: data.label ?? '',
            placeholder: NODE_TYPE_BY_ID[typeId].label,
        }));

        fields.push(systemPromptField({
            value: data.systemPrompt ?? '',
            typeId,
        }));

        switch (typeId) {
            case 'CLOUD':
                fields.push(selectField({
                    id: 'cloudProvider',
                    label: 'Provider',
                    options: CLOUD_PROVIDERS,
                    value: data.cloudProvider || 'auto',
                }));
                break;
            case 'LITE_RT':
                fields.push(textField({
                    id: 'modelPath',
                    label: 'Model name',
                    value: data.modelPath ?? '',
                    placeholder: 'e.g. gemma-2b-it',
                }));
                break;
            case 'TOOL':
                fields.push(selectField({
                    id: 'toolName',
                    label: 'Tool',
                    options: [{ id: '', label: '— none —' }, ...AVAILABLE_TOOLS],
                    value: data.toolName ?? '',
                }));
                break;
            case 'CLARIFICATION':
                fields.push(numberField({
                    id: 'clarificationTimeoutMs',
                    label: 'Timeout (ms)',
                    value: data.clarificationTimeoutMs ?? 60000,
                    min: 0,
                    step: 1000,
                }));
                break;
            case 'INTENT_ROUTER':
                // Routing prose lives in systemPrompt (same field used by
                // the runtime engine on Android). Earlier builds wrote it
                // to a separate `intentRouterPrompt` slot that had no
                // domain counterpart; that field is no longer surfaced
                // and migrated to systemPrompt when nodes are loaded.
                break;
            case 'IF_CONDITION':
                fields.push(textareaField({
                    id: 'conditionPrompt',
                    label: 'Classification prompt',
                    value: data.conditionPrompt ?? '',
                    rows: 3,
                }));
                fields.push(textField({
                    id: 'conditionKeywords',
                    label: 'Keywords (comma-separated)',
                    value: data.conditionKeywords ?? '',
                }));
                fields.push(numberField({
                    id: 'conditionComplexity',
                    label: 'Complexity threshold',
                    value: data.conditionComplexity ?? '',
                    min: 0,
                    step: 1,
                }));
                break;
        }

        fields.push(renderContextConfigSection(data.contextConfig));

        return fields;
    }

    function fieldWrap(labelText) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        if (labelText) {
            const lab = document.createElement('label');
            lab.textContent = labelText;
            wrap.appendChild(lab);
        }
        return wrap;
    }

    function textField({ id, label, value, placeholder }) {
        const wrap = fieldWrap(label);
        const input = document.createElement('input');
        input.type = 'text';
        input.dataset.field = id;
        input.value = value ?? '';
        if (placeholder) input.placeholder = placeholder;
        wrap.appendChild(input);
        return wrap;
    }

    function textareaField({ id, label, value, rows }) {
        const wrap = fieldWrap(label);
        const ta = document.createElement('textarea');
        ta.dataset.field = id;
        ta.rows = rows || 4;
        ta.value = value ?? '';
        wrap.appendChild(ta);
        return wrap;
    }

    /**
     * Specialised textarea for the system prompt — adds a row of variable
     * chips ($DATE, $TIME, ...) and a "📚 Prompts" picker above the
     * textarea. Clicking a chip splices the token at the current caret;
     * picking a template replaces the textarea content (after a confirm
     * if it's non-empty).
     */
    function systemPromptField({ value, typeId }) {
        const wrap = fieldWrap('System prompt');
        const ta = document.createElement('textarea');
        ta.dataset.field = 'systemPrompt';
        ta.rows = 4;
        ta.value = value ?? '';

        const toolbarRow = document.createElement('div');
        toolbarRow.className = 'prompt-toolbar';

        // Variable chips on the left
        const chips = document.createElement('div');
        chips.className = 'variable-chips';
        PROMPT_VARIABLES.forEach(name => {
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'variable-chip';
            chip.textContent = '$' + name;
            chip.addEventListener('click', () => insertAtCaret(ta, '$' + name));
            chips.appendChild(chip);
        });
        toolbarRow.appendChild(chips);

        // Prompts picker on the right
        const promptsBtn = document.createElement('button');
        promptsBtn.type = 'button';
        promptsBtn.className = 'prompts-trigger';
        promptsBtn.textContent = '📚 Prompts ▾';
        promptsBtn.setAttribute('aria-haspopup', 'listbox');
        promptsBtn.setAttribute('aria-expanded', 'false');
        toolbarRow.appendChild(promptsBtn);

        const popover = document.createElement('div');
        popover.className = 'prompts-popover';
        popover.hidden = true;
        toolbarRow.appendChild(popover);

        let popoverOpen = false;
        const closePopover = () => {
            if (!popoverOpen) return;
            popoverOpen = false;
            popover.hidden = true;
            promptsBtn.setAttribute('aria-expanded', 'false');
            document.removeEventListener('mousedown', onOutsideClick, true);
            document.removeEventListener('keydown', onPopoverKey, true);
        };
        const onOutsideClick = e => {
            if (!toolbarRow.contains(e.target)) closePopover();
        };
        // Esc closes the popover only — without preventDefault, the
        // browser would also fire the dialog's native `cancel` event and
        // dismiss the whole node config dialog.
        const onPopoverKey = e => {
            if (e.key !== 'Escape') return;
            e.preventDefault();
            e.stopPropagation();
            closePopover();
        };
        const openPopover = () => {
            renderPromptsPopover(popover, ta, typeId, () => closePopover());
            popover.hidden = false;
            popoverOpen = true;
            promptsBtn.setAttribute('aria-expanded', 'true');
            document.addEventListener('mousedown', onOutsideClick, true);
            document.addEventListener('keydown', onPopoverKey, true);
        };
        promptsBtn.addEventListener('click', () => {
            if (popoverOpen) closePopover();
            else openPopover();
        });

        wrap.appendChild(toolbarRow);
        wrap.appendChild(ta);
        return wrap;
    }

    /**
     * Repaints the prompts popover panel from scratch, so saving / deleting
     * a user template can call back into this function to reflect the new
     * list without rebuilding the whole dialog.
     */
    function renderPromptsPopover(popover, textarea, typeId, closeFn) {
        popover.innerHTML = '';

        const builtinSection = document.createElement('div');
        builtinSection.className = 'prompts-section';
        const builtinTitle = document.createElement('div');
        builtinTitle.className = 'prompts-section-title';
        builtinTitle.textContent = 'Built-in';
        builtinSection.appendChild(builtinTitle);

        // Offer only the bundled presets whose nodeType matches the node
        // being edited — same per-NodeType filtering the Android Prompt
        // Library applies. Node types with no bundled preset (INPUT, TOOL,
        // QUEUE_PROCESSOR) fall back to the "Reset to type default" row below.
        const relevant = BUILTIN_PROMPT_TEMPLATES.filter(t => t.nodeType === typeId);
        if (relevant.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'prompts-empty';
            empty.textContent = 'No built-in presets for this node type.';
            builtinSection.appendChild(empty);
        } else {
            relevant.forEach(t => {
                builtinSection.appendChild(promptItemRow({
                    label: t.name,
                    title: t.description,
                    onPick: () => applyPromptTemplate(textarea, t.content, closeFn),
                }));
            });
        }

        // Per-type "Reset to type default" — only meaningful for types that
        // ship a default in DEFAULT_SYSTEM_PROMPTS.
        if (DEFAULT_SYSTEM_PROMPTS[typeId]) {
            builtinSection.appendChild(promptItemRow({
                label: `Reset to ${typeId} default`,
                onPick: () => applyPromptTemplate(textarea, DEFAULT_SYSTEM_PROMPTS[typeId], closeFn),
            }));
        }
        popover.appendChild(builtinSection);

        const userSection = document.createElement('div');
        userSection.className = 'prompts-section';
        const userTitle = document.createElement('div');
        userTitle.className = 'prompts-section-title';
        userTitle.textContent = 'Saved templates';
        userSection.appendChild(userTitle);

        const userTemplates = loadUserPromptTemplates();
        if (userTemplates.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'prompts-empty';
            empty.textContent = 'No saved templates yet.';
            userSection.appendChild(empty);
        } else {
            userTemplates.forEach((t, idx) => {
                userSection.appendChild(promptItemRow({
                    label: t.name,
                    onPick: () => applyPromptTemplate(textarea, t.content, closeFn),
                    onDelete: () => {
                        if (!confirm(`Delete template "${t.name}"?`)) return;
                        const updated = loadUserPromptTemplates();
                        updated.splice(idx, 1);
                        saveUserPromptTemplates(updated);
                        renderPromptsPopover(popover, textarea, typeId, closeFn);
                    },
                }));
            });
        }
        popover.appendChild(userSection);

        const saveRow = document.createElement('button');
        saveRow.type = 'button';
        saveRow.className = 'prompts-save-current';
        saveRow.textContent = '+ Save current prompt as template…';
        saveRow.addEventListener('click', () => {
            const content = textarea.value.trim();
            if (!content) {
                alert('System prompt is empty — nothing to save.');
                return;
            }
            const name = (prompt('Template name?') || '').trim();
            if (!name) return;
            const list = loadUserPromptTemplates();
            const existing = list.findIndex(t => t.name === name);
            if (existing !== -1) {
                if (!confirm(`Overwrite template "${name}"?`)) return;
                list[existing] = { name, content, savedAt: Date.now() };
            } else {
                list.push({ name, content, savedAt: Date.now() });
            }
            saveUserPromptTemplates(list);
            renderPromptsPopover(popover, textarea, typeId, closeFn);
        });
        popover.appendChild(saveRow);
    }

    /**
     * Renders one row of the prompts list — clickable label, optional
     * `title` hover tooltip (e.g. a built-in preset's description), optional
     * delete `[×]`. Buttons keep `type="button"` so Enter triggers a native
     * click rather than form submission.
     */
    function promptItemRow({ label, title, onPick, onDelete }) {
        const row = document.createElement('div');
        row.className = 'prompts-row';
        const pick = document.createElement('button');
        pick.type = 'button';
        pick.className = 'prompts-row-pick';
        pick.textContent = label;
        if (title) pick.title = title;
        pick.addEventListener('click', onPick);
        row.appendChild(pick);
        if (onDelete) {
            const del = document.createElement('button');
            del.type = 'button';
            del.className = 'prompts-row-delete';
            del.title = 'Delete template';
            del.setAttribute('aria-label', `Delete template ${label}`);
            del.textContent = '×';
            del.addEventListener('click', onDelete);
            row.appendChild(del);
        }
        return row;
    }

    /**
     * Replaces the textarea content with the picked template after
     * confirming any non-empty existing prompt would be overwritten.
     */
    function applyPromptTemplate(textarea, content, closeFn) {
        const current = textarea.value.trim();
        if (current && current !== content.trim()) {
            if (!confirm('Replace current prompt with the selected template?')) return;
        }
        textarea.value = content;
        textarea.dispatchEvent(new Event('input', { bubbles: true }));
        textarea.focus();
        closeFn();
    }

    /**
     * Inserts [token] at the textarea's current selection, replacing any
     * selected text and putting the caret right after the inserted token.
     * Mirrors the behaviour of TextFieldValueExt.insertAtCursor on the
     * Android side so the UX matches.
     */
    function insertAtCaret(textarea, token) {
        textarea.focus();
        const start = textarea.selectionStart ?? textarea.value.length;
        const end = textarea.selectionEnd ?? textarea.value.length;
        textarea.setRangeText(token, start, end, 'end');
    }

    function numberField({ id, label, value, min, step }) {
        const wrap = fieldWrap(label);
        const input = document.createElement('input');
        input.type = 'number';
        input.dataset.field = id;
        if (value !== '' && value != null) input.value = String(value);
        if (min !== undefined) input.min = String(min);
        if (step !== undefined) input.step = String(step);
        wrap.appendChild(input);
        return wrap;
    }

    function selectField({ id, label, options, value }) {
        const wrap = fieldWrap(label);
        const select = document.createElement('select');
        select.dataset.field = id;
        options.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o.id;
            opt.textContent = o.label;
            if (o.id === value) opt.selected = true;
            select.appendChild(opt);
        });
        wrap.appendChild(select);
        return wrap;
    }

    function renderContextConfigSection(cfg) {
        const section = document.createElement('section');
        section.className = 'context-section';
        section.dataset.role = 'context-config';

        const title = document.createElement('div');
        title.className = 'section-title';
        title.textContent = 'Input data';
        section.appendChild(title);

        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.textContent = 'These flags control which context blocks are mixed into the node input on every run.';
        section.appendChild(hint);

        const rows = [
            { id: 'originalTask',   label: 'Original task' },
            { id: 'chatHistory',    label: 'Chat history' },
            { id: 'longTermMemory', label: 'Long-term memory' },
            { id: 'toolResults',    label: 'Tool results' },
            { id: 'nodeInput',      label: 'Previous node output', locked: true },
        ];
        rows.forEach(r => {
            const row = document.createElement('label');
            row.className = 'ctx-row' + (r.locked ? ' locked' : '');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.dataset.ctx = r.id;
            cb.checked = r.locked ? true : !!cfg[r.id];
            if (r.locked) cb.disabled = true;
            row.appendChild(cb);

            const text = document.createElement('span');
            text.textContent = r.label;
            row.appendChild(text);

            if (r.locked) {
                const hintEl = document.createElement('span');
                hintEl.className = 'lock-hint';
                hintEl.textContent = 'always on';
                row.appendChild(hintEl);
            }
            section.appendChild(row);
        });

        return section;
    }

    function readDialogForm() {
        const result = {};
        dialogBody.querySelectorAll('[data-field]').forEach(el => {
            const key = el.dataset.field;
            if (el.type === 'number') {
                const raw = el.value.trim();
                result[key] = raw === '' ? null : Number(raw);
            } else {
                result[key] = el.value;
            }
        });
        const ctx = {};
        dialogBody.querySelectorAll('[data-ctx]').forEach(el => {
            ctx[el.dataset.ctx] = el.checked;
        });
        ctx.nodeInput = true; // forced regardless of UI tampering
        result.contextConfig = ctx;
        return result;
    }

    function commitDialog() {
        if (dialogNodeId == null) return;
        const internal = editor.getNodeFromId(dialogNodeId);
        if (!internal) return;
        const patch = readDialogForm();

        // Validate numeric-y fields. On bad input we abort the close so the
        // user can fix the value rather than silently dropping it.
        if ('clarificationTimeoutMs' in patch && patch.clarificationTimeoutMs != null
            && (Number.isNaN(patch.clarificationTimeoutMs) || patch.clarificationTimeoutMs < 0)) {
            alert('Timeout must be a non-negative number');
            return;
        }
        if ('conditionComplexity' in patch && patch.conditionComplexity != null
            && (Number.isNaN(patch.conditionComplexity) || patch.conditionComplexity < 0)) {
            alert('Complexity threshold must be a non-negative number');
            return;
        }

        const merged = Object.assign({}, internal.data || {}, patch);
        editor.updateNodeDataFromId(dialogNodeId, merged);

        // Update the visible label inside the rendered node DOM. drawflow
        // does not re-render html when data changes, so we patch by hand.
        const labelEl = document.querySelector(
            `#node-${dialogNodeId} .node-body .label`,
        );
        if (labelEl) {
            const t = NODE_TYPE_BY_ID[internal.name];
            labelEl.textContent = merged.label || t.label;
        }

        pushSnapshot();
        runValidation();
        closeDialog();
    }

    function closeDialog() {
        dialogNodeId = null;
        if (dialog.open) dialog.close();
    }

    dialogSaveBtn.addEventListener('click', commitDialog);
    dialogCancelBtn.addEventListener('click', closeDialog);
    // Native <dialog> closes on Esc by emitting `cancel`; treat as cancel.
    dialog.addEventListener('cancel', e => {
        e.preventDefault();
        closeDialog();
    });
    // Submit via Enter inside a single-line input commits the form. We use
    // method="dialog" form, so <button data-role="save"> is type="button"
    // explicitly; Enter still bubbles up — listen at form level. Skip for
    // textareas (multi-line typing) and for any button — pressing Enter on
    // a focused button is its native activation key, so the variable chips
    // and the Save / Cancel buttons must run their own click handlers
    // rather than save the dialog out from under the user.
    dialog.querySelector('form').addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (e.target instanceof HTMLTextAreaElement) return;
        if (e.target instanceof HTMLButtonElement) return;
        e.preventDefault();
        commitDialog();
    });

    // Delegated dblclick on nodes. Excludes connection labels (those have
    // their own dblclick handler attached on the label element).
    canvas.addEventListener('dblclick', e => {
        const nodeEl = e.target.closest('.drawflow-node');
        if (!nodeEl) return;
        // Don't trigger when double-clicking input/output ports — drawflow
        // already uses single-click on those for connection bookkeeping.
        if (e.target.closest('.input, .output')) return;
        const id = nodeEl.id.replace(/^node-/, '');
        openNodeConfigDialog(id);
    });

    /* -------------------------------------------------------------------- *
     *  Connection label overlay
     *
     *  drawflow has no native edge labels. We keep a Map keyed by
     *  "<outNodeId>_<outClass>_<inNodeId>_<inClass>" and overlay an
     *  absolutely-positioned <div> at the midpoint of each <path.main-path>.
     *  Re-render on every event that may change geometry.
     * -------------------------------------------------------------------- */
    const labelsLayer = document.getElementById('labels-layer');
    /** @type {Map<string, string>} */
    const connectionLabels = new Map();

    function connectionKey(outId, outClass, inId, inClass) {
        return `${outId}_${outClass}_${inId}_${inClass}`;
    }

    function parseConnectionElement(svgEl) {
        // drawflow generates: <svg class="connection node_in_node-X node_out_node-Y output_N input_M">
        const cls = svgEl.getAttribute('class') || '';
        const inMatch  = cls.match(/node_in_node-(\d+)/);
        const outMatch = cls.match(/node_out_node-(\d+)/);
        const outClassMatch = cls.match(/(?:^|\s)(output_\d+)(?:\s|$)/);
        const inClassMatch  = cls.match(/(?:^|\s)(input_\d+)(?:\s|$)/);
        if (!inMatch || !outMatch || !outClassMatch || !inClassMatch) return null;
        return {
            outId: outMatch[1],
            inId: inMatch[1],
            outClass: outClassMatch[1],
            inClass: inClassMatch[1],
            svgEl,
        };
    }

    function redrawLabels() {
        // Wipe existing label DOM and rebuild from scratch — cheap enough
        // for the node counts we expect (tens) and avoids stale references.
        labelsLayer.innerHTML = '';
        const wrapperRect = labelsLayer.getBoundingClientRect();
        const svgs = canvas.querySelectorAll('svg.connection');
        svgs.forEach(svg => {
            const meta = parseConnectionElement(svg);
            if (!meta) return;
            const path = svg.querySelector('path.main-path');
            if (!path) return;
            let mid;
            try {
                const total = path.getTotalLength();
                if (!isFinite(total) || total <= 0) return;
                mid = path.getPointAtLength(total / 2);
            } catch (_) {
                return;
            }
            // path.getPointAtLength returns coords in the SVG's user space
            // (pre-scale). The SVG sits inside drawflow's precanvas which is
            // CSS-scaled by editor.zoom, so multiply the user-space offset
            // by zoom to get on-screen pixels relative to the SVG's
            // already-post-scale getBoundingClientRect().
            const svgRect = svg.getBoundingClientRect();
            const x = svgRect.left + mid.x * editor.zoom - wrapperRect.left;
            const y = svgRect.top  + mid.y * editor.zoom - wrapperRect.top;

            const key = connectionKey(meta.outId, meta.outClass, meta.inId, meta.inClass);
            const text = connectionLabels.get(key) || '';
            const labelEl = document.createElement('div');
            labelEl.className = 'conn-label' + (text ? '' : ' empty');
            labelEl.textContent = text || '+ label';
            labelEl.style.left = x + 'px';
            labelEl.style.top  = y + 'px';
            labelEl.dataset.key = key;
            labelEl.addEventListener('dblclick', e => {
                e.stopPropagation();
                beginLabelEdit(labelEl, key);
            });
            labelsLayer.appendChild(labelEl);
        });
    }

    function beginLabelEdit(labelEl, key) {
        const current = connectionLabels.get(key) || '';
        labelEl.classList.remove('empty');
        labelEl.textContent = '';
        const input = document.createElement('input');
        input.type = 'text';
        input.value = current;
        labelEl.appendChild(input);
        input.focus();
        input.select();

        let finished = false;
        const commit = (save) => {
            if (finished) return;
            finished = true;
            const next = save ? input.value.trim() : current;
            if (save && next !== current) {
                if (next) connectionLabels.set(key, next);
                else connectionLabels.delete(key);
                pushSnapshot();
            }
            redrawLabels();
        };
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); commit(true); }
            else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
            // Stop the global Delete/Backspace handler from eating typing
            e.stopPropagation();
        });
        input.addEventListener('blur', () => commit(true));
    }

    /* -------------------------------------------------------------------- *
     *  Selection tracking
     * -------------------------------------------------------------------- */
    /** @type {{kind:'node', id:string} | {kind:'connection', outId:string, inId:string, outClass:string, inClass:string} | null} */
    let currentSelection = null;

    editor.on('nodeSelected', id => {
        currentSelection = { kind: 'node', id: String(id) };
        updateToolbar();
    });
    editor.on('nodeUnselected', () => {
        if (currentSelection?.kind === 'node') currentSelection = null;
        updateToolbar();
    });
    editor.on('connectionSelected', info => {
        currentSelection = {
            kind: 'connection',
            outId: String(info.output_id),
            inId: String(info.input_id),
            outClass: info.output_class,
            inClass: info.input_class,
        };
        updateToolbar();
    });
    editor.on('connectionUnselected', () => {
        if (currentSelection?.kind === 'connection') currentSelection = null;
        updateToolbar();
    });

    /* -------------------------------------------------------------------- *
     *  Delete (button + Delete/Backspace key)
     * -------------------------------------------------------------------- */
    document.getElementById('btn-delete').addEventListener('click', deleteSelection);

    function deleteSelection() {
        if (!currentSelection) return;
        if (currentSelection.kind === 'node') {
            editor.removeNodeId('node-' + currentSelection.id);
        } else {
            const sel = currentSelection;
            editor.removeSingleConnection(sel.outId, sel.inId, sel.outClass, sel.inClass);
            connectionLabels.delete(connectionKey(sel.outId, sel.outClass, sel.inId, sel.inClass));
        }
        currentSelection = null;
        updateToolbar();
    }

    document.addEventListener('keydown', e => {
        // Suppress all canvas hotkeys while the node config dialog is open —
        // otherwise Delete/Backspace on a <select> (or any non-input control
        // inside the modal) deletes the selected node behind it, and Ctrl+Z
        // would silently undo graph state mid-edit.
        if (dialog.open) return;

        const target = e.target;
        const typing = target instanceof HTMLElement &&
            (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable);
        if (typing) return;

        if (e.key === 'Delete' || e.key === 'Backspace') {
            if (currentSelection) {
                e.preventDefault();
                deleteSelection();
            }
            return;
        }
        const meta = e.metaKey || e.ctrlKey;
        if (!meta) return;
        const k = e.key.toLowerCase();
        if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
        else if ((k === 'z' && e.shiftKey) || k === 'y') { e.preventDefault(); redo(); }
    });

    /* -------------------------------------------------------------------- *
     *  Undo / Redo via snapshot stack
     *
     *  Each snapshot pairs drawflow.export() (full graph) with a copy of the
     *  edge-label map. Restoring is editor.clear() + editor.import() + label
     *  rebuild — drawflow has no in-place history, so the wholesale swap is
     *  the cleanest path and is fast for the graph sizes we expect.
     * -------------------------------------------------------------------- */
    const MAX_HISTORY = 100;
    /** @type {Array<{drawflow: object, labels: Array<[string,string]>}>} */
    let history = [];
    let historyIndex = -1;
    let suppressHistory = false;
    let moveDebounceTimer = null;

    function takeSnapshot() {
        return {
            drawflow: JSON.parse(JSON.stringify(editor.export())),
            labels: Array.from(connectionLabels.entries()),
        };
    }

    function pushSnapshot() {
        if (suppressHistory) return;
        // Drop redo tail
        if (historyIndex < history.length - 1) {
            history = history.slice(0, historyIndex + 1);
        }
        history.push(takeSnapshot());
        if (history.length > MAX_HISTORY) {
            history.shift();
        } else {
            historyIndex++;
        }
        if (historyIndex >= MAX_HISTORY) historyIndex = MAX_HISTORY - 1;
        updateToolbar();
    }

    function applySnapshot(snapshot) {
        suppressHistory = true;
        try {
            editor.clear();
            editor.import(JSON.parse(JSON.stringify(snapshot.drawflow)));
            connectionLabels.clear();
            snapshot.labels.forEach(([k, v]) => connectionLabels.set(k, v));
        } finally {
            suppressHistory = false;
        }
        currentSelection = null;
        redrawLabels();
        updateToolbar();
        runValidation();
    }

    function undo() {
        if (historyIndex <= 0) return;
        historyIndex--;
        applySnapshot(history[historyIndex]);
    }

    function redo() {
        if (historyIndex >= history.length - 1) return;
        historyIndex++;
        applySnapshot(history[historyIndex]);
    }

    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-redo').addEventListener('click', redo);

    function updateToolbar() {
        document.getElementById('btn-undo').disabled = historyIndex <= 0;
        document.getElementById('btn-redo').disabled = historyIndex >= history.length - 1;
        document.getElementById('btn-delete').disabled = !currentSelection;
    }

    /* -------------------------------------------------------------------- *
     *  Hook drawflow events: keep labels redrawn and history in sync
     * -------------------------------------------------------------------- */
    editor.on('nodeCreated', () => {
        redrawLabels();
        if (!suppressAutoLabel) { pushSnapshot(); runValidation(); }
    });
    editor.on('nodeRemoved', () => {
        redrawLabels();
        if (!suppressAutoLabel) { pushSnapshot(); runValidation(); }
    });
    /**
     * Per-type seed labels for connections, matching the inline port
     * labels rendered next to multi-output nodes. Single-output types are
     * absent here and produce no auto-label.
     */
    const PORT_AUTO_LABELS = {
        IF_CONDITION:    { output_1: 'True', output_2: 'False' },
        QUEUE_PROCESSOR: { output_1: 'Item', output_2: 'Done'  },
    };

    editor.on('connectionCreated', info => {
        // Auto-fill the edge label so multi-output nodes (IF_CONDITION,
        // QUEUE_PROCESSOR) get a meaningful branch label without forcing
        // the user to double-click and type. Only seed when no label is
        // already set (e.g. via import or earlier connect on the same
        // socket pair). Skipped entirely while importing — the document's
        // labels are authoritative.
        if (info && !suppressAutoLabel) {
            const src = editor.getNodeFromId(String(info.output_id));
            const map = src && PORT_AUTO_LABELS[src.name];
            if (map) {
                const key = connectionKey(
                    String(info.output_id), info.output_class,
                    String(info.input_id),  info.input_class,
                );
                if (!connectionLabels.has(key)) {
                    const branch = map[info.output_class];
                    if (branch) connectionLabels.set(key, branch);
                }
            }
        }
        redrawLabels();
        if (!suppressAutoLabel) {
            pushSnapshot();
            runValidation();
        }
    });
    editor.on('connectionRemoved', info => {
        if (info) {
            connectionLabels.delete(connectionKey(
                String(info.output_id), info.output_class,
                String(info.input_id),  info.input_class,
            ));
        }
        redrawLabels();
        if (!suppressAutoLabel) { pushSnapshot(); runValidation(); }
    });
    editor.on('nodeMoved', () => {
        redrawLabels();
        if (moveDebounceTimer) clearTimeout(moveDebounceTimer);
        moveDebounceTimer = setTimeout(() => { pushSnapshot(); moveDebounceTimer = null; }, 250);
    });
    editor.on('translate', redrawLabels);
    // drawflow emits `zoom` *before* the CSS transform is committed, so the
    // SVG's getBoundingClientRect() is still on the previous frame — defer
    // the redraw to the next animation frame. The wheel-listener below is a
    // safety net for the rare case the zoom event is missed.
    editor.on('zoom', scheduleLabelRedraw);
    editor.on('import', redrawLabels);
    canvas.addEventListener('wheel', scheduleLabelRedraw, { passive: true });

    let labelRedrawScheduled = false;
    function scheduleLabelRedraw() {
        if (labelRedrawScheduled) return;
        labelRedrawScheduled = true;
        requestAnimationFrame(() => {
            labelRedrawScheduled = false;
            redrawLabels();
        });
    }

    /* -------------------------------------------------------------------- *
     *  Graph validation
     *
     *  Mirrors the rule set of Android `PipelineGraph.validate()` adapted
     *  to the editor's needs: structural cardinality, connectivity, cycles,
     *  and per-node context-config sanity. Errors block export; warnings
     *  surface for the user but do not. Triggered after every mutation
     *  event listed below.
     * -------------------------------------------------------------------- */
    const validationItemsEl = document.querySelector('#validation-panel [data-role="items"]');
    const validationCountsEl = document.querySelector('#validation-panel [data-role="counts"]');
    const exportBtn = document.getElementById('btn-export');

    /**
     * Pulls the current graph from drawflow's internal store. Each entry has
     * { id, name (=nodeType), data, inputs, outputs }; we only need the
     * shape, not the rendered HTML.
     */
    function snapshotGraph() {
        const data = editor.export();
        const homeNodes = data?.drawflow?.Home?.data || {};
        const nodes = Object.entries(homeNodes).map(([id, n]) => ({
            id: String(id),
            type: n.name,
            data: n.data || {},
            inputs: n.inputs || {},
            outputs: n.outputs || {},
        }));
        return nodes;
    }

    /**
     * Mirror of Android NodeModel.usesContextConfig(): only context-aware
     * node types feed their input through NodeContextBuilder, so
     * NodeEmptyContext is meaningful only for them. Control-flow types
     * (INPUT, IF_CONDITION, QUEUE_PROCESSOR) and OUTPUT in echo mode (no
     * systemPrompt) forward upstream text verbatim regardless of flags.
     */
    const CONTEXT_AWARE_TYPES = new Set([
        'LITE_RT', 'CLOUD', 'OUTPUT', 'SUMMARY', 'INTENT_ROUTER',
        'DECOMPOSITION', 'EVALUATION', 'CLARIFICATION', 'TOOL',
    ]);
    function usesContextConfig(node) {
        if (!CONTEXT_AWARE_TYPES.has(node.type)) return false;
        if (node.type === 'OUTPUT') {
            const sp = node.data?.systemPrompt;
            if (!sp || !String(sp).trim()) return false;
        }
        return true;
    }

    /**
     * @returns {{errors:Array, warnings:Array}}
     * Each item: { kind, level, message, nodeId? }
     */
    function validateGraph() {
        const errors = [];
        const warnings = [];
        const nodes = snapshotGraph();

        const inputs  = nodes.filter(n => n.type === 'INPUT');
        const outputs = nodes.filter(n => n.type === 'OUTPUT');

        if (inputs.length === 0)  errors.push({ kind: 'MissingInput',    level: 'error', message: 'Graph must contain an INPUT node.' });
        if (inputs.length > 1)    errors.push({ kind: 'MultipleInputs',  level: 'error', message: 'Graph contains more than one INPUT node.' });
        if (outputs.length === 0) errors.push({ kind: 'MissingOutput',   level: 'error', message: 'Graph must contain an OUTPUT node.' });
        if (outputs.length > 1)   errors.push({ kind: 'MultipleOutputs', level: 'error', message: 'Graph contains more than one OUTPUT node.' });

        // Build adjacency. Cycle DFS ignores back-edges into QUEUE_PROCESSOR
        // (matches Android PipelineGraph.isValidDAG()), but reachability
        // BFS uses the full graph since loops still propagate execution.
        const idToType = new Map(nodes.map(n => [n.id, n.type]));
        const forward = new Map(nodes.map(n => [n.id, []]));
        const backward = new Map(nodes.map(n => [n.id, []]));
        nodes.forEach(n => {
            Object.values(n.outputs).forEach(out => {
                (out.connections || []).forEach(c => {
                    const tgt = String(c.node);
                    if (forward.has(n.id))   forward.get(n.id).push(tgt);
                    if (backward.has(tgt))   backward.get(tgt).push(n.id);
                });
            });
        });

        // Endpoint connectivity — match PipelineGraph.validate(): every
        // INPUT must have at least one outgoing edge, every OUTPUT at
        // least one incoming. These are *errors*, not warnings, so the
        // export gate kicks in for an INPUT/OUTPUT pair with no edge.
        inputs.forEach(n => {
            if ((forward.get(n.id) || []).length === 0) {
                errors.push({
                    kind: 'DisconnectedInput', level: 'error', nodeId: n.id,
                    message: 'INPUT node is not connected.',
                });
            }
        });
        outputs.forEach(n => {
            if ((backward.get(n.id) || []).length === 0) {
                errors.push({
                    kind: 'DisconnectedOutput', level: 'error', nodeId: n.id,
                    message: 'OUTPUT node is not connected.',
                });
            }
        });

        // Reachability — every non-INPUT node must be reachable from some
        // INPUT, every non-OUTPUT node must be able to reach some OUTPUT.
        // Skip when the corresponding endpoint is missing entirely; the
        // cardinality error already covers that case.
        if (inputs.length > 0) {
            const reachable = new Set(inputs.map(n => n.id));
            const queue = inputs.map(n => n.id);
            while (queue.length) {
                const u = queue.shift();
                (forward.get(u) || []).forEach(v => {
                    if (!reachable.has(v)) { reachable.add(v); queue.push(v); }
                });
            }
            nodes.forEach(n => {
                if (n.type === 'INPUT') return;
                if (!reachable.has(n.id)) {
                    errors.push({
                        kind: 'UnreachableNode', level: 'error', nodeId: n.id,
                        message: 'Node is unreachable from INPUT.',
                    });
                }
            });
        }
        if (outputs.length > 0) {
            const canReach = new Set(outputs.map(n => n.id));
            const queue = outputs.map(n => n.id);
            while (queue.length) {
                const u = queue.shift();
                (backward.get(u) || []).forEach(v => {
                    if (!canReach.has(v)) { canReach.add(v); queue.push(v); }
                });
            }
            nodes.forEach(n => {
                if (n.type === 'OUTPUT') return;
                if (!canReach.has(n.id)) {
                    errors.push({
                        kind: 'DeadEndNode', level: 'error', nodeId: n.id,
                        message: 'Node cannot reach OUTPUT.',
                    });
                }
            });
        }

        // Cycle detection (DFS with rec-stack), ignoring edges into
        // QUEUE_PROCESSOR.
        const dfsForward = new Map();
        nodes.forEach(n => {
            const filtered = (forward.get(n.id) || []).filter(t => idToType.get(t) !== 'QUEUE_PROCESSOR');
            dfsForward.set(n.id, filtered);
        });
        const visited = new Set();
        const stack = new Set();
        let hasCycle = false;
        function dfs(u) {
            if (hasCycle) return;
            if (stack.has(u)) { hasCycle = true; return; }
            if (visited.has(u)) return;
            visited.add(u);
            stack.add(u);
            (dfsForward.get(u) || []).forEach(dfs);
            stack.delete(u);
        }
        nodes.forEach(n => { if (!hasCycle) dfs(n.id); });
        if (hasCycle) {
            errors.push({ kind: 'HasCycles', level: 'error', message: 'Graph contains a cycle.' });
        }

        // Empty context — only meaningful for context-aware types. Skipping
        // INPUT / IF_CONDITION / QUEUE_PROCESSOR (and OUTPUT in echo mode)
        // matches Android usesContextConfig(), so legacy/imported JSON with
        // all-off flags on a control-flow node is not flagged.
        nodes.forEach(n => {
            if (!usesContextConfig(n)) return;
            const ctx = n.data?.contextConfig;
            if (!ctx) return;
            const allOff = !ctx.chatHistory && !ctx.originalTask && !ctx.nodeInput
                && !ctx.longTermMemory && !ctx.toolResults;
            if (allOff) {
                errors.push({
                    kind: 'NodeEmptyContext',
                    level: 'error',
                    nodeId: n.id,
                    message: 'All context sources are disabled on this node.',
                });
            }
        });

        return { errors, warnings };
    }

    /** Centers the canvas on the given node by adjusting drawflow's pan. */
    function centerOnNode(nodeId) {
        const internal = editor.getNodeFromId(nodeId);
        if (!internal) return;
        const wrap = canvas.getBoundingClientRect();
        const el = document.getElementById('node-' + nodeId);
        const halfW = el ? el.offsetWidth / 2 : 70;
        const halfH = el ? el.offsetHeight / 2 : 30;
        const z = editor.zoom;
        const tx = wrap.width  / 2 - (internal.pos_x + halfW) * z;
        const ty = wrap.height / 2 - (internal.pos_y + halfH) * z;
        editor.canvas_x = tx;
        editor.canvas_y = ty;
        editor.precanvas.style.transform = `translate(${tx}px, ${ty}px) scale(${z})`;
        scheduleLabelRedraw();
    }

    function nodeDisplayName(nodeId) {
        const internal = editor.getNodeFromId(nodeId);
        if (!internal) return '#' + nodeId;
        const t = NODE_TYPE_BY_ID[internal.name];
        return (internal.data && internal.data.label) || (t ? t.label : internal.name);
    }

    function renderValidation({ errors, warnings }) {
        validationItemsEl.innerHTML = '';
        const total = errors.length + warnings.length;
        if (total === 0) {
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = 'No issues — graph is ready to export.';
            validationItemsEl.appendChild(empty);
        } else {
            [...errors, ...warnings].forEach(item => {
                const row = document.createElement('div');
                row.className = 'item ' + item.level;
                const icon = document.createElement('span');
                icon.className = 'icon';
                icon.textContent = item.level === 'error' ? '❌' : '⚠️';
                row.appendChild(icon);

                const text = document.createElement('span');
                text.textContent = item.message + (item.nodeId ? ' ' : '');
                row.appendChild(text);

                if (item.nodeId) {
                    const link = document.createElement('button');
                    link.type = 'button';
                    link.className = 'node-link';
                    link.textContent = nodeDisplayName(item.nodeId);
                    link.addEventListener('click', () => centerOnNode(item.nodeId));
                    row.appendChild(link);
                }
                validationItemsEl.appendChild(row);
            });
        }
        validationCountsEl.textContent = total === 0
            ? 'OK'
            : `${errors.length} error(s), ${warnings.length} warning(s)`;

        // Re-paint per-node highlight classes
        canvas.querySelectorAll('.drawflow-node.has-error, .drawflow-node.has-warning')
            .forEach(el => el.classList.remove('has-error', 'has-warning'));
        const errorIds   = new Set(errors.filter(e => e.nodeId).map(e => e.nodeId));
        const warningIds = new Set(warnings.filter(w => w.nodeId).map(w => w.nodeId));
        errorIds.forEach(id => {
            const el = document.getElementById('node-' + id);
            if (el) el.classList.add('has-error');
        });
        warningIds.forEach(id => {
            if (errorIds.has(id)) return; // error supersedes warning
            const el = document.getElementById('node-' + id);
            if (el) el.classList.add('has-warning');
        });

        // Disable Export when any error is present.
        exportBtn.disabled = errors.length > 0;
    }

    function runValidation() {
        renderValidation(validateGraph());
        // Welcome overlay visibility tracks the same lifecycle as
        // validation: every mutation refreshes it so the placeholder
        // shows when the graph is empty and hides as soon as the user
        // drops the first node.
        document.body.dataset.graphEmpty = String(snapshotGraph().length === 0);
    }

    /**
     * Load the starter pipeline: INPUT → CLOUD → OUTPUT, three nodes and
     * two connections. Reuses the same addNode path as the drag-and-drop
     * flow so default prompts, contextConfig and the rendered HTML are
     * identical to a manually-created node.
     */
    function loadExamplePipeline() {
        suppressAutoLabel = true;
        try {
            editor.clear();
            connectionLabels.clear();

            const ROW_Y = 200;
            const seed = (typeId, x) => {
                const t = NODE_TYPE_BY_ID[typeId];
                const dfId = editor.addNode(
                    t.id, t.inputs, t.outputs, x, ROW_Y,
                    'nodetype-' + t.id,
                    defaultNodeData(typeId),
                    nodeHtml(t),
                );
                return String(dfId);
            };
            const inId = seed('INPUT', 80);
            const cloudId = seed('CLOUD', 360);
            const outId = seed('OUTPUT', 660);

            editor.addConnection(inId, cloudId, 'output_1', 'input_1');
            editor.addConnection(cloudId, outId, 'output_1', 'input_1');

            currentPipelineId = generateUuid();
            nameInput.value = 'Example pipeline';
        } finally {
            suppressAutoLabel = false;
        }
        history = [];
        historyIndex = -1;
        redrawLabels();
        pushSnapshot();
        runValidation();
    }
    document.getElementById('btn-load-example').addEventListener('click', loadExamplePipeline);

    /* -------------------------------------------------------------------- *
     *  Auto-layout
     *
     *  Lays out nodes left-to-right by longest-path depth from the root
     *  set (nodes with no incoming edges). Same cycle rule as the
     *  validator: back-edges into QUEUE_PROCESSOR are ignored, anything
     *  else cyclic blocks the layout because longest-path is undefined.
     * -------------------------------------------------------------------- */
    const AUTOLAYOUT_LEVEL_GAP = 240;
    const AUTOLAYOUT_ROW_GAP = 140;
    const AUTOLAYOUT_ORIGIN_X = 80;
    const AUTOLAYOUT_ORIGIN_Y = 60;

    function autoLayout() {
        const nodes = snapshotGraph();
        if (nodes.length === 0) return;

        // Build forward adjacency, ignoring edges into QUEUE_PROCESSOR
        // (those represent the loop body and would otherwise inflate
        // depths or close real cycles).
        const idToType = new Map(nodes.map(n => [n.id, n.type]));
        const adj = new Map(nodes.map(n => [n.id, []]));
        const inDeg = new Map(nodes.map(n => [n.id, 0]));
        nodes.forEach(n => {
            Object.values(n.outputs).forEach(out => {
                (out.connections || []).forEach(c => {
                    const tgt = String(c.node);
                    if (idToType.get(tgt) === 'QUEUE_PROCESSOR') return;
                    adj.get(n.id).push(tgt);
                    inDeg.set(tgt, (inDeg.get(tgt) || 0) + 1);
                });
            });
        });

        // Kahn topological order; if it terminates with unprocessed
        // nodes the (non-QUEUE_PROCESSOR) graph contains a cycle.
        const queue = [];
        const order = [];
        inDeg.forEach((deg, id) => { if (deg === 0) queue.push(id); });
        while (queue.length) {
            const u = queue.shift();
            order.push(u);
            (adj.get(u) || []).forEach(v => {
                inDeg.set(v, inDeg.get(v) - 1);
                if (inDeg.get(v) === 0) queue.push(v);
            });
        }
        if (order.length < nodes.length) {
            alert('Auto-layout requires a cycle-free graph.');
            return;
        }

        // Longest-path depth in topo order — gives the column index.
        const depth = new Map(nodes.map(n => [n.id, 0]));
        order.forEach(u => {
            (adj.get(u) || []).forEach(v => {
                depth.set(v, Math.max(depth.get(v), depth.get(u) + 1));
            });
        });

        // Group by depth, then assign y by stable index within each
        // column so nodes that share a column stack vertically.
        const buckets = new Map();
        nodes.forEach(n => {
            const d = depth.get(n.id);
            if (!buckets.has(d)) buckets.set(d, []);
            buckets.get(d).push(n.id);
        });

        buckets.forEach((ids, d) => {
            ids.forEach((id, row) => {
                const x = AUTOLAYOUT_ORIGIN_X + d * AUTOLAYOUT_LEVEL_GAP;
                const y = AUTOLAYOUT_ORIGIN_Y + row * AUTOLAYOUT_ROW_GAP;
                applyNodePosition(id, x, y);
            });
        });

        scheduleLabelRedraw();
        pushSnapshot();
        runValidation();
    }

    /**
     * Updates a drawflow node's position both in the internal store and
     * in the rendered DOM, then asks drawflow to redraw connections that
     * touch this node. drawflow does not expose a setter, so we patch
     * the data directly — same pattern its own drag handler uses.
     */
    function applyNodePosition(id, x, y) {
        const internal = editor.drawflow?.drawflow?.Home?.data?.[id];
        if (!internal) return;
        internal.pos_x = x;
        internal.pos_y = y;
        const el = document.getElementById('node-' + id);
        if (el) {
            el.style.top = y + 'px';
            el.style.left = x + 'px';
        }
        editor.updateConnectionNodes('node-' + id);
    }

    document.getElementById('btn-autolayout').addEventListener('click', autoLayout);

    /* -------------------------------------------------------------------- *
     *  Theme toggle (dark / light)
     *
     *  Choice persists across sessions via localStorage. On first load
     *  (no stored value) we honour the OS-level prefers-color-scheme so
     *  users on light desktops don't get a black flash.
     * -------------------------------------------------------------------- */
    const THEME_STORAGE_KEY = 'pipeline-editor-theme';
    const themeBtn = document.getElementById('btn-theme');

    function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        // Sun glyph when light theme is active (clicking goes to dark),
        // moon glyph when dark theme is active (clicking goes to light).
        themeBtn.textContent = theme === 'light' ? '☀️' : '🌙';
    }

    function initialTheme() {
        try {
            const stored = localStorage.getItem(THEME_STORAGE_KEY);
            if (stored === 'light' || stored === 'dark') return stored;
        } catch (_) { /* Safari private mode etc. — fall through */ }
        if (typeof matchMedia === 'function'
            && matchMedia('(prefers-color-scheme: light)').matches) {
            return 'light';
        }
        return 'dark';
    }

    applyTheme(initialTheme());
    themeBtn.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
        applyTheme(next);
        try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch (_) { /* ignore */ }
    });

    /* -------------------------------------------------------------------- *
     *  JSON export / import (schemaVersion 1)
     *
     *  Schema is symmetric on both sides (this editor and the Android
     *  app's PipelineJsonSerializer). Every drawflow node maps to one
     *  JSON node carrying its position, label, type-specific config and
     *  the five-flag NodeContextConfig. Edge labels round-trip in the
     *  `connections[].label` field — they're what carries True/False or
     *  Item/Done semantics for multi-output nodes.
     * -------------------------------------------------------------------- */
    const CURRENT_SCHEMA_VERSION = 1;
    const importBtn = document.getElementById('btn-import');
    const fileImportInput = document.getElementById('file-import');
    const nameInput = document.getElementById('pipeline-name');

    /** Pipeline-level identity. Stable across exports until import replaces it. */
    let currentPipelineId = generateUuid();

    function generateUuid() {
        // crypto.randomUUID is available in all modern browsers; the manual
        // fallback covers older Safari snapshots loaded from disk via file://.
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
            return crypto.randomUUID();
        }
        return 'p-' + Date.now().toString(16) + '-' + Math.random().toString(16).slice(2, 10);
    }

    /**
     * Builds the canonical JSON document for the current graph state.
     */
    function exportToJson() {
        const nodes = snapshotGraph(); // reuse the validator's snapshot helper
        const jsonNodes = nodes.map(n => {
            const internal = editor.getNodeFromId(n.id);
            const fullData = Object.assign(defaultNodeData(n.type), n.data || {});
            return {
                id: 'node-' + n.id,
                type: n.type,
                position: { x: internal.pos_x, y: internal.pos_y },
                label: fullData.label || NODE_TYPE_BY_ID[n.type].label,
                config: {
                    systemPrompt: fullData.systemPrompt || null,
                    cloudProvider: fullData.cloudProvider || null,
                    modelPath: fullData.modelPath || null,
                    toolName: fullData.toolName || null,
                    clarificationTimeoutMs: fullData.clarificationTimeoutMs ?? null,
                    conditionPrompt: fullData.conditionPrompt || null,
                    conditionKeywords: fullData.conditionKeywords || null,
                    conditionComplexity: fullData.conditionComplexity ?? null,
                },
                contextConfig: Object.assign(
                    { chatHistory: true, originalTask: true, nodeInput: true, longTermMemory: true, toolResults: true },
                    fullData.contextConfig || {},
                ),
            };
        });

        const jsonConnections = [];
        nodes.forEach(n => {
            Object.entries(n.outputs).forEach(([outClass, outDesc]) => {
                (outDesc.connections || []).forEach(c => {
                    const inClass = c.output; // drawflow names the target's input class `output` here
                    const labelKey = connectionKey(n.id, outClass, String(c.node), inClass);
                    jsonConnections.push({
                        id: 'conn-' + n.id + '-' + outClass + '-' + c.node + '-' + inClass,
                        fromNodeId: 'node-' + n.id,
                        toNodeId: 'node-' + c.node,
                        label: connectionLabels.get(labelKey) || null,
                    });
                });
            });
        });

        return {
            schemaVersion: CURRENT_SCHEMA_VERSION,
            id: currentPipelineId,
            name: (nameInput.value || '').trim() || 'Untitled pipeline',
            updatedAt: Date.now(),
            nodes: jsonNodes,
            connections: jsonConnections,
        };
    }

    function downloadJson(obj) {
        const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
        a.download = `pipeline-${today}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    exportBtn.addEventListener('click', () => {
        if (validateGraph().errors.length > 0) return;
        downloadJson(exportToJson());
    });

    /* -------------------------------------------------------------------- *
     *  Import
     * -------------------------------------------------------------------- */
    importBtn.addEventListener('click', () => fileImportInput.click());
    fileImportInput.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        // Reset so re-selecting the same file fires `change` again
        fileImportInput.value = '';
        const reader = new FileReader();
        reader.onload = () => {
            try {
                importFromJson(JSON.parse(reader.result));
            } catch (err) {
                alert('Failed to parse JSON: ' + err.message);
            }
        };
        reader.onerror = () => alert('Failed to read file.');
        reader.readAsText(file);
    });

    /**
     * Tells the connectionCreated auto-label seed to stand down while we
     * rebuild the graph from JSON — labels in the document are
     * authoritative.
     */
    let suppressAutoLabel = false;

    function importFromJson(doc) {
        // Validate structure BEFORE touching the canvas — clearing the
        // current graph and then crashing partway through the rebuild
        // would silently destroy the user's work for a malformed file.
        if (!doc || typeof doc !== 'object' || Array.isArray(doc)) {
            alert('File does not contain a valid JSON document.');
            return;
        }
        if (doc.nodes != null && !Array.isArray(doc.nodes)) {
            alert('Invalid pipeline document: "nodes" must be an array.');
            return;
        }
        if (doc.connections != null && !Array.isArray(doc.connections)) {
            alert('Invalid pipeline document: "connections" must be an array.');
            return;
        }
        const rawNodes = doc.nodes || [];
        const rawConnections = doc.connections || [];
        for (let i = 0; i < rawNodes.length; i++) {
            const jn = rawNodes[i];
            if (!jn || typeof jn !== 'object' || Array.isArray(jn)) {
                alert(`Invalid pipeline document: nodes[${i}] is not an object.`);
                return;
            }
            if (typeof jn.id !== 'string' || !jn.id) {
                alert(`Invalid pipeline document: nodes[${i}].id is missing.`);
                return;
            }
            if (typeof jn.type !== 'string' || !NODE_TYPE_BY_ID[jn.type]) {
                alert(`Invalid pipeline document: nodes[${i}] has unknown type "${jn.type}".`);
                return;
            }
        }
        for (let i = 0; i < rawConnections.length; i++) {
            const jc = rawConnections[i];
            if (!jc || typeof jc !== 'object' || Array.isArray(jc)) {
                alert(`Invalid pipeline document: connections[${i}] is not an object.`);
                return;
            }
        }

        if (doc.schemaVersion !== CURRENT_SCHEMA_VERSION) {
            const ok = confirm(
                `File was created by a different editor version ` +
                `(schemaVersion=${doc.schemaVersion}, expected ${CURRENT_SCHEMA_VERSION}). ` +
                `Some configuration may not round-trip cleanly. Continue?`,
            );
            if (!ok) return;
        }

        // Build a stripped numeric-id → seeded data map keyed by the JSON's
        // own ids. drawflow assigns its own integer ids on addNode, so we
        // cannot honour the JSON ids verbatim — instead we map JSON ids to
        // drawflow ids during the rebuild and use that map when wiring
        // connections.
        const idMap = new Map();
        suppressAutoLabel = true;
        try {
            // Wipe everything: graph, history, labels.
            editor.clear();
            connectionLabels.clear();

            rawNodes.forEach(jn => {
                const t = NODE_TYPE_BY_ID[jn.type];
                const merged = Object.assign(defaultNodeData(jn.type), {
                    label: jn.label || t.label,
                    systemPrompt: jn.config?.systemPrompt || '',
                    cloudProvider: jn.config?.cloudProvider || (jn.type === 'CLOUD' ? 'auto' : ''),
                    modelPath: jn.config?.modelPath || '',
                    toolName: jn.config?.toolName || '',
                    clarificationTimeoutMs: jn.config?.clarificationTimeoutMs ?? (jn.type === 'CLARIFICATION' ? 60000 : null),
                    conditionPrompt: jn.config?.conditionPrompt || '',
                    conditionKeywords: jn.config?.conditionKeywords || '',
                    conditionComplexity: jn.config?.conditionComplexity ?? null,
                    contextConfig: Object.assign(defaultContextConfig(jn.type), jn.contextConfig || {}, {
                        nodeInput: true, // locked-on regardless of file contents
                    }),
                });
                // Carry over a legacy intentRouterPrompt field if present
                // so the migration helper can fold it into systemPrompt.
                if (jn.config?.intentRouterPrompt) merged.intentRouterPrompt = jn.config.intentRouterPrompt;
                const data = migrateLegacyNodeData(jn.type, merged);
                const dfId = editor.addNode(
                    t.id, t.inputs, t.outputs,
                    jn.position?.x ?? 0, jn.position?.y ?? 0,
                    'nodetype-' + t.id,
                    data,
                    nodeHtml(t),
                );
                idMap.set(jn.id, String(dfId));
                // Patch the visible label inside the just-rendered node.
                const labelEl = document.querySelector(`#node-${dfId} .node-body .label`);
                if (labelEl) labelEl.textContent = data.label || t.label;
            });

            rawConnections.forEach(jc => {
                const srcDf = idMap.get(jc.fromNodeId);
                const tgtDf = idMap.get(jc.toNodeId);
                if (!srcDf || !tgtDf) {
                    console.warn('Connection references unknown node:', jc);
                    return;
                }
                const srcType = editor.getNodeFromId(srcDf)?.name;
                const outClass = pickOutputClass(srcType, jc.label);
                const inClass = 'input_1';
                editor.addConnection(srcDf, tgtDf, outClass, inClass);
                if (jc.label) {
                    connectionLabels.set(connectionKey(srcDf, outClass, tgtDf, inClass), jc.label);
                }
            });

            // Restore pipeline-level identity & name from the file.
            currentPipelineId = doc.id || generateUuid();
            nameInput.value = doc.name || '';
        } finally {
            suppressAutoLabel = false;
        }

        redrawLabels();
        // The history stack belongs to the pre-import state — wipe it so the
        // user can't undo "into" an inconsistent half-imported snapshot.
        history = [];
        historyIndex = -1;
        pushSnapshot();
        runValidation();
    }

    /**
     * Picks which output socket a connection should attach to when
     * recreating it from JSON. For single-output types we always use
     * output_1; for multi-output types we honour the inline-port labels
     * (True/False, Item/Done) so the rebuilt graph matches what the user
     * exported.
     */
    function pickOutputClass(srcType, label) {
        if (srcType === 'IF_CONDITION') {
            if (label === 'False') return 'output_2';
            return 'output_1';
        }
        if (srcType === 'QUEUE_PROCESSOR') {
            if (label === 'Done') return 'output_2';
            return 'output_1';
        }
        return 'output_1';
    }

    // Re-validation on dialog save and on undo/redo lives inside the
    // original commitDialog / applySnapshot bodies (see below) — function
    // declarations are hoisted so they can call runValidation() defined
    // here without a forward-declaration dance.

    // Initial empty snapshot so undo "back to blank" works after first action.
    pushSnapshot();
    updateToolbar();
    runValidation();

    // Expose for manual debugging in DevTools
    window.__editor = editor;
    window.__labels = connectionLabels;
    window.__validate = validateGraph;
    window.__exportJson = exportToJson;
    window.__importJson = importFromJson;
</script>
</body>
</html>
